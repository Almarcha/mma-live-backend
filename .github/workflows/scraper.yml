name: 🥊 Scraper UFC automático

on:
  schedule:
    - cron: '0 6 * * *'    # Cada día a las 6:00 AM UTC
    - cron: '0 18 * * 6'   # Extra los sábados a las 18:00 (día de eventos UFC)
  workflow_dispatch:         # Ejecución manual desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper (eventos)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/scraper_ufc.py --mode events

      # Ejecutar scraper completo de peleadores solo los domingos
      - name: Ejecutar scraper (peleadores - semanal)
        if: github.event.schedule == '0 6 * * 0'   # Solo domingos
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/scraper_ufc.py --mode fighters
